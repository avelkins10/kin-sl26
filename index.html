    .tab-content.active { display: block; }

    .vs-badge { background: #1e2530; color: #64748b; border-radius: 99px; padding: 2px 8px; font-size: 10px; font-weight: 700; }

// ─────────────────────────────────────────────
// STATUS HELPERS
// ─────────────────────────────────────────────

function getStatus(comp) {
  const now = today;
  const start = new Date(comp.dates.start);
  const end = new Date(comp.dates.end);
  if (now >= start && now <= end) return 'active';
  if (now < start) return 'upcoming';
  return 'complete';
}

function statusLabel(s) {
  if (s === 'active')   return '<span class="status-active   text-xs font-semibold px-2 py-0.5 rounded-full">LIVE</span>';
  if (s === 'upcoming') return '<span class="status-upcoming text-xs font-semibold px-2 py-0.5 rounded-full">UPCOMING</span>';
  return                       '<span class="status-complete text-xs font-semibold px-2 py-0.5 rounded-full">DONE</span>';
}

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  const diff = Math.ceil((d - today) / 86400000);
  if (diff > 0) return `Starts in ${diff}d`;
  return null;
}

function daysLeft(dateStr) {
  const d = new Date(dateStr);
  const diff = Math.ceil((d - today) / 86400000);
  if (diff > 0) return `${diff}d left`;
  return null;
}

function formatDateRange(start, end) {
  const s = new Date(start);
  const e = new Date(end);
  const opts = { month: 'short', day: 'numeric' };
  return `${s.toLocaleDateString('en-US', opts)} – ${e.toLocaleDateString('en-US', opts)}`;
}

// ─────────────────────────────────────────────
// RENDER COMP CARD (sidebar)
// ─────────────────────────────────────────────

function renderCompCard(comp) {
  const status = getStatus(comp);
  let sub = '';
  if (status === 'upcoming') sub = daysUntil(comp.dates.start) || '';
  else if (status === 'active') sub = daysLeft(comp.dates.end) || '';
  else sub = 'Season complete';

  return `
    <div class="card comp-card p-4" onclick="showDetail('${comp.id}')" id="card-${comp.id}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-3">
          <div class="text-2xl">${comp.emoji}</div>
          <div>
            <div class="font-bold text-white text-sm">${comp.name}</div>
            <div class="text-xs text-gray-500 mt-0.5">${formatDateRange(comp.dates.start, comp.dates.end)}</div>
          </div>
        </div>
        ${statusLabel(status)}
      </div>
      <div class="flex items-center justify-between mt-3">
        <span class="${comp.tagClass} text-xs font-semibold px-2 py-0.5 rounded-full">${comp.tag}</span>
        <span class="text-xs text-gray-600">${sub}</span>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────

let activeCompId = null;

function showDetail(id) {
  const comp = COMPS.find(c => c.id === id);
  if (!comp) return;

  // highlight active card
  document.querySelectorAll('.comp-card').forEach(el => el.style.borderColor = '');
  const card = document.getElementById('card-' + id);
  if (card) card.style.borderColor = '#22c55e';

  activeCompId = id;

  const placeholder = document.getElementById('detail-placeholder');
  const content = document.getElementById('detail-content');
  if (placeholder) placeholder.style.display = 'none';
  content.style.display = 'block';
  content.innerHTML = renderDetail(comp);
  content.classList.remove('fade-in');
  void content.offsetWidth;
  content.classList.add('fade-in');

  // On mobile, scroll to detail
  if (window.innerWidth < 768) {
    content.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function switchTab(btn, tabId) {
  const panel = btn.closest('.flex-1, .detail-col, [id="detail-content"]') || document;
  // deactivate all tabs in this detail panel
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (btn.parentElement.contains(b)) b.classList.remove('active');
  });
  btn.classList.add('active');
  // hide all content
  document.querySelectorAll('.tab-content').forEach(el => {
    if (el.id.endsWith(tabId.split('-').slice(-1)[0]) || el.id === tabId) {
      // only show the matching one
    }
  });
  // hide all in this comp
  const compId = tabId.split('-').slice(1).join('-');
  document.querySelectorAll(`[id$="-${compId}"].tab-content`).forEach(el => el.classList.remove('active'));
  const target = document.getElementById(tabId);
  if (target) {
    target.classList.add('active');
    target.classList.remove('fade-in');
    void target.offsetWidth;
    target.classList.add('fade-in');
  }
}

function filterComps(group, btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.comp-group').forEach(g => {
    if (group === 'all' || g.dataset.group === group) {
      g.style.display = 'block';
    } else {
      g.style.display = 'none';
    }
  });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

function init() {
  // Date display
  const el = document.getElementById('current-date');
  if (el) el.textContent = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

  // Render all comp cards
  const monthly = COMPS.filter(c => c.group === 'monthly');
  const summer  = COMPS.filter(c => c.group === 'summer');
  const year    = COMPS.filter(c => c.group === 'yearlong');

  document.getElementById('monthly-list').innerHTML = monthly.map(renderCompCard).join('');
  document.getElementById('summer-list').innerHTML  = summer.map(renderCompCard).join('');
  document.getElementById('yearlong-list').innerHTML = year.map(renderCompCard).join('');

  // Auto-open first active or first upcoming comp
  const active = COMPS.find(c => getStatus(c) === 'active');
  const first  = active || COMPS.find(c => getStatus(c) === 'upcoming') || COMPS[0];
  if (first) showDetail(first.id);
}

init();
</script>
